name: Sync PPS Excel → pps-data.js

on:
  workflow_dispatch:
    inputs:
      xlsm_filename:
        description: "Excel filename in repo root (default: PPS_1450_Frazee_Sep_24_2025_Reference.xlsm)"
        required: false
        default: "PPS_1450_Frazee_Sep_24_2025_Reference.xlsm"

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Run parser
        run: |
          python .github/scripts/xlsm_to_js.py \
            "${{ github.event.inputs.xlsm_filename }}" \
            pps-data.js

      - name: Verify output
        run: |
          echo "=== pps-data.js size ==="
          wc -c pps-data.js
          echo "=== First 10 lines ==="
          head -10 pps-data.js
          echo "=== FFE item count ==="
          grep -c '"id": "FFE-' pps-data.js || true
          echo "=== Move record count ==="
          grep -c '"id": "MM-' pps-data.js || true

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pps-data.js
          if git diff --cached --quiet; then
            echo "No changes detected — pps-data.js is already up to date."
          else
            XLSM="${{ github.event.inputs.xlsm_filename }}"
            git commit -m "chore: sync pps-data.js from ${XLSM} [skip ci]"
            git push origin main
          fi
