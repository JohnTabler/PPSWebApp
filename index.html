<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPS – Plan Perfect Systems</title>
<link rel="stylesheet" href="pps-theme.css">
<style>
/* ── SPA SHELL ──────────────────────────────────────────────── */
#app-content { flex: 1; display: flex; flex-direction: column; height: 100%; margin-left: 220px; overflow: hidden; }
.page-enter { animation: fadeSlide 0.18s ease; }
@keyframes fadeSlide { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* ── DASHBOARD ──────────────────────────────────────────────── */
.fin-table { width:100%; border-collapse:collapse; }
.fin-table th { font-family:var(--mono); font-size:9px; letter-spacing:0.1em; color:var(--muted); text-transform:uppercase; text-align:right; padding:10px 0; }
.fin-table th:first-child { text-align:left; }
.fin-table td { font-size:12px; padding:8px 0; border-bottom:1px solid var(--border); vertical-align:middle; }
.fin-table td:not(:first-child) { text-align:right; font-family:var(--mono); }
.fin-table tr:last-child td { border-bottom:none; }
.fin-name { display:flex; align-items:center; gap:8px; }
.dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.positive { color:var(--accent2); }
.total-row td { font-weight:700; padding-top:12px; border-top:1px solid var(--border); font-size:13px; }
.gantt-wrap { overflow-x:auto; }
.gantt-table { width:100%; border-collapse:collapse; min-width:800px; }
.gantt-table th { font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:0.08em; text-align:center; padding:10px 0; }
.gantt-table th.label-col { text-align:left; min-width:200px; }
.gantt-table td { padding:5px 0; border-bottom:1px solid var(--border); font-size:11px; }
.gantt-table tr:last-child td { border-bottom:none; }
.act-label { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; padding-right:12px; }
.act-type  { font-family:var(--mono); font-size:9px; color:var(--muted); }
.gantt-cell { position:relative; height:24px; }
.bar { position:absolute; top:4px; height:16px; border-radius:3px; display:flex; align-items:center; padding:0 6px; font-family:var(--mono); font-size:9px; color:#fff; white-space:nowrap; overflow:hidden; }
.pct-badge { font-family:var(--mono); font-size:9px; color:var(--muted); text-align:right; padding-left:8px; }
.donut-wrap { display:flex; flex-direction:column; align-items:center; gap:16px; }
svg.donut { overflow:visible; }
.legend-item { display:flex; align-items:center; gap:8px; font-size:11px; }
.legend-swatch { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
.legend-amt { font-family:var(--mono); font-size:10px; color:var(--muted); margin-left:auto; }

/* ── SCHEDULE ───────────────────────────────────────────────── */
.legend { display:flex; gap:16px; align-items:center; }
.leg-item { display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10px; color:var(--muted); }
.leg-dot { width:10px; height:10px; border-radius:2px; }
.gantt-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.gantt-header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.gantt-title { font-size:13px; font-weight:700; }
.gantt-grid { display:flex; min-width:1100px; }
.gantt-labels { width:300px; flex-shrink:0; border-right:1px solid var(--border); }
.gantt-label-header { height:36px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; }
.header-txt { font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }
.gantt-row { height:40px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:8px; }
.gantt-row:last-child { border-bottom:none; }
.act-name { font-size:11px; font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.act-type-pill { font-family:var(--mono); font-size:12px; padding:3px 5px; border-radius:2px; flex-shrink:0; }
.tp-move  { background:rgba(79,156,249,0.15); color:var(--accent); }
.tp-ffe   { background:rgba(56,217,169,0.15); color:var(--accent2); }
.tp-other { background:rgba(255,169,77,0.15);  color:var(--warn); }
.tp-swing { background:rgba(107,117,145,0.2);  color:var(--muted); }
.gantt-timeline { flex:1; }
.gantt-dates { height:36px; border-bottom:1px solid var(--border); display:flex; }
.date-col { flex:1; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:9px; color:var(--muted); border-right:1px solid var(--border); }
.date-col:last-child { border-right:none; }
.gantt-bar-row { height:40px; border-bottom:1px solid var(--border); display:flex; align-items:center; position:relative; }
.gantt-bar-row:last-child { border-bottom:none; }
.bar-item { position:absolute; height:22px; border-radius:4px; display:flex; align-items:center; padding:0 8px; font-family:var(--mono); font-size:9px; color:rgba(255,255,255,0.9); white-space:nowrap; overflow:hidden; }
.today-line { position:absolute; top:0; bottom:0; width:2px; background:var(--danger); opacity:0.7; z-index:5; }
.pct-col { width:64px; flex-shrink:0; border-left:1px solid var(--border); }
.pct-header { height:36px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:center; }
.pct-header span { font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }
.pct-row { height:40px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:center; gap:4px; }
.pct-row:last-child { border-bottom:none; }
.pct-num { font-family:var(--mono); font-size:10px; }
.pct-bar { width:28px; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.pct-fill { height:100%; background:var(--accent); border-radius:2px; }
.milestone { position:absolute; width:12px; height:12px; background:var(--warn); transform:rotate(45deg); z-index:5; }

/* ── PAGE-SPECIFIC EXTRAS ───────────────────────────────────── */
.note-cell { color:var(--muted); font-size:10px; max-width:180px; overflow:hidden; text-overflow:ellipsis; }
.item-desc { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:300px; color:var(--muted); font-size:10px; }
/* Table container: fixed height, own scroll context — sticky thead and always-visible scrollbar both work natively */
.table-wrap { overflow:auto; flex:1; min-height:0; }
.table-wrap thead th { position:sticky; top:0; z-index:10; background:var(--surface2); box-shadow:0 2px 0 var(--border); }
.ffe-detail-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:100; display:flex; align-items:center; justify-content:center; }
.ffe-detail-modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:680px; max-width:92vw; max-height:85vh; display:flex; flex-direction:column; overflow:hidden; }
.ffe-detail-header { padding:18px 24px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.ffe-detail-title { font-size:15px; font-weight:700; }
.ffe-detail-subtitle { font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:3px; }
.ffe-detail-close { background:none; border:none; font-size:18px; color:var(--muted); cursor:pointer; flex-shrink:0; padding:0; line-height:1; }
.ffe-detail-close:hover { color:var(--text); }
.ffe-detail-body { overflow-y:auto; padding:20px 24px; display:grid; grid-template-columns:1fr 1fr; gap:0; }
.ffe-detail-field { padding:9px 0; border-bottom:1px solid var(--border); }
.ffe-detail-field:nth-last-child(-n+2) { border-bottom:none; }
.ffe-detail-key { font-family:var(--mono); font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:3px; }
.ffe-detail-val { font-size:12px; font-weight:500; }
.severity-high { color:var(--danger); font-family:var(--mono); font-size:9px; font-weight:700; }
.severity-med  { color:var(--warn);   font-family:var(--mono); font-size:9px; font-weight:700; }
.severity-low  { color:var(--muted);  font-family:var(--mono); font-size:9px; }
.pct-inline { display:flex; align-items:center; gap:6px; }
.pct-text { font-family:var(--mono); font-size:10px; width:28px; text-align:right; }

/* ── REPORTS ────────────────────────────────────────────────── */
.reports-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; }
.pbi-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.pbi-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.pbi-title { font-size:13px; font-weight:700; }
.pbi-meta  { font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:0.08em; }
.pbi-embed { height:280px; background:var(--surface2); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
.pbi-icon  { font-size:36px; opacity:0.3; }
.pbi-label { font-family:var(--mono); font-size:11px; color:var(--muted); text-align:center; line-height:1.6; }
.pbi-label strong { color:var(--accent); }
.pbi-footer { padding:12px 20px; border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.export-panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px 24px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
.export-label { font-size:13px; font-weight:700; flex:1; min-width:160px; }
.export-sub   { font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:2px; }
.export-btns  { display:flex; gap:10px; flex-wrap:wrap; }
.export-btn   { display:flex; align-items:center; gap:6px; padding:9px 16px; border-radius:7px; border:1px solid var(--border); background:var(--surface2); font-family:var(--sans); font-size:12px; font-weight:600; color:var(--text); cursor:pointer; }
.export-btn:hover { border-color:var(--accent); color:var(--accent); }
.export-btn .ext { font-family:var(--mono); font-size:9px; background:var(--border); padding:1px 5px; border-radius:3px; color:var(--muted); }

/* ── ADMIN ──────────────────────────────────────────────────── */
.settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.setting-row { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--border); gap:20px; }
.setting-row:last-child { border-bottom:none; }
.setting-label { font-size:13px; font-weight:600; }
.setting-desc  { font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:2px; }
.setting-input  { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:7px 10px; font-family:var(--sans); font-size:12px; color:var(--text); outline:none; min-width:200px; }
.setting-input:focus { border-color:var(--accent); }
.setting-select { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:7px 10px; font-family:var(--sans); font-size:12px; color:var(--text); outline:none; appearance:none; cursor:pointer; min-width:160px; }
.toggle-wrap { display:flex; align-items:center; gap:8px; }
.toggle { width:36px; height:20px; border-radius:10px; background:var(--border); position:relative; cursor:pointer; transition:background 0.2s; flex-shrink:0; }
.toggle.on { background:var(--accent); }
.toggle::after { content:''; position:absolute; width:14px; height:14px; border-radius:50%; background:#fff; top:3px; left:3px; transition:left 0.2s; }
.toggle.on::after { left:19px; }
.toggle-label { font-family:var(--mono); font-size:10px; color:var(--muted); }
.lookup-tag { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; background:var(--surface2); border:1px solid var(--border); border-radius:5px; font-family:var(--mono); font-size:10px; color:var(--text); margin:3px; }
.lookup-tag .remove { color:var(--muted); cursor:pointer; font-size:12px; line-height:1; }
.lookup-tag .remove:hover { color:var(--danger); }
.lookup-add { display:flex; gap:8px; margin-top:10px; }
.lookup-add input { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:6px 10px; font-family:var(--sans); font-size:11px; color:var(--text); outline:none; flex:1; }
.lookup-add input:focus { border-color:var(--accent); }

/* ── USERS ──────────────────────────────────────────────────── */
.user-avatar { width:28px; height:28px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; flex-shrink:0; }
.user-cell { display:flex; align-items:center; gap:10px; }
.user-cell-name  { font-size:12px; font-weight:600; }
.user-cell-email { font-family:var(--mono); font-size:10px; color:var(--muted); }
.role-admin  { background:rgba(255,107,107,0.1); color:var(--danger); border:1px solid rgba(255,107,107,0.2); font-family:var(--mono); font-size:9px; padding:2px 7px; border-radius:3px; display:inline-block; }
.role-pm     { background:rgba(79,156,249,0.12);  color:var(--accent); border:1px solid rgba(79,156,249,0.2);  font-family:var(--mono); font-size:9px; padding:2px 7px; border-radius:3px; display:inline-block; }
.role-viewer { background:rgba(107,117,145,0.15); color:var(--muted);  border:1px solid var(--border);          font-family:var(--mono); font-size:9px; padding:2px 7px; border-radius:3px; display:inline-block; }
.u-active    { background:rgba(56,217,169,0.12);  color:var(--accent2); }
.u-inactive  { background:rgba(107,117,145,0.15); color:var(--muted); }
.u-pending   { background:rgba(255,169,77,0.12);  color:var(--warn); }
.proj-tag { display:inline-block; padding:2px 7px; background:var(--surface2); border:1px solid var(--border); border-radius:3px; font-family:var(--mono); font-size:9px; color:var(--muted); margin:1px; }
</style>
</head>
<body>

<!-- ── MAIN CONTENT AREA ─────────────────────────────────────── -->
<div id="app-content"></div>

<script src="pps-data.js"></script>
<script>
// =============================================================
// PPS SPA — Single Page Application
// =============================================================

// ── Shared helpers ────────────────────────────────────────────
const fmt  = n => n === 0 ? '$0' : '$' + n.toLocaleString();
const fmtK = n => '$' + Math.round(n / 1000) + 'K';
const processStatusClass = {'In Stock':'s-instock','Ordered':'s-ordered','Review':'s-review','Quoted':'s-quoted','Delivered':'s-delivered'};
const ffeStatusClass     = {'On Track':'fs-ontrack','Issue':'fs-issue','N/A':'fs-na'};
const priorityClass      = {'High':'p-high','Med':'p-med','Low':'p-low'};
const moveStatusClass    = {'On Track':'ms-ontrack','Complete':'ms-complete','Issue':'ms-issue','—':'ms-na'};
const typeColor          = {'Move':'#4f9cf9','FF&E':'#38d9a9','Swing':'#6b7591','Other':'#ffa94d'};
const typePillClass      = {'Move':'tp-move','FF&E':'tp-ffe','Swing':'tp-swing','Other':'tp-other'};
const avatarColors       = ['#4f9cf9','#38d9a9','#ffa94d','#ff6b6b','#a78bfa'];

// ── Merge helper ──────────────────────────────────────────────
function mergeFinancials(a, b) {
  return a.map(row => {
    const match = b.find(r => r.label === row.label);
    return match ? { ...row, planned: row.planned + match.planned, actual: row.actual + match.actual } : row;
  });
}

const PPS_ALL = {
    project: {
    name: 'All Projects',
    subtitle: 'Combined View',
    moveDate: '—',
    budget: PPS.project.budget + PPS_2.project.budget,
    plannedSpend: PPS.project.plannedSpend + PPS_2.project.plannedSpend,
  },
  user: PPS.user,
  financials: mergeFinancials(PPS.financials, PPS_2.financials),
  ffeItems: [...PPS.ffeItems, ...PPS_2.ffeItems],
  moveRecords: [...PPS.moveRecords, ...PPS_2.moveRecords],
  scheduleActivities: [...PPS.scheduleActivities, ...PPS_2.scheduleActivities],
  users: [...PPS.users, ...PPS_2.users],
  swingSpaceItems: [...PPS.swingSpaceItems, ...PPS_2.swingSpaceItems],
  tenantImprovementItems: [...PPS.tenantImprovementItems, ...PPS_2.tenantImprovementItems],
  issues: [...PPS.issues, ...PPS_2.issues],
  punchListItems: [...PPS.punchListItems, ...PPS_2.punchListItems],
};

// ── Active Project ────────────────────────────────────────────
let ACTIVE = PPS;

function updateSidebar() {
  document.getElementById('sidebar-project-name').innerHTML = ACTIVE.project.name + '<br>' + ACTIVE.project.subtitle;
  document.getElementById('user-initials').textContent = ACTIVE.user.initials;
  document.getElementById('user-name').textContent     = ACTIVE.user.name;
  document.getElementById('user-role').textContent     = ACTIVE.user.role;
}
updateSidebar();

const switcher = document.getElementById('project-switcher');
if (switcher) {
  switcher.addEventListener('change', function () {
  if (this.value === 'PPS_2') ACTIVE = PPS_2;
  else if (this.value === 'ALL') ACTIVE = PPS_ALL;
  else ACTIVE = PPS;
  updateSidebar();
  navigate(location.hash.replace('#', '') || 'dashboard');
});
}

// ── Filter chip + search wiring ───────────────────────────────
function wireFilters(container, getData, searchFn, filterFn, renderFn) {
  let activeFilter = 'All';
  let searchQuery  = '';
  function apply() {
    let items = getData();
    if (searchQuery) items = items.filter(i => searchFn(i, searchQuery));
    renderFn(items, activeFilter);
  }
  container.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', function() {
      container.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active','green'));
      this.classList.add('active');
      activeFilter = this.textContent.replace('🚨 ','').replace('🔴 ','').trim();
      apply();
    });
  });
  const searchInput = container.querySelector('.search-box input');
  if (searchInput) searchInput.addEventListener('input', function() { searchQuery = this.value.toLowerCase(); apply(); });
  apply();
}

function showFFEDetail(id) {
  const i = ACTIVE.ffeItems.find(x => x.id === id)
         || ACTIVE.swingSpaceItems.find(x => x.id === id)
         || ACTIVE.tenantImprovementItems.find(x => x.id === id)
         || ACTIVE.moveRecords.find(x => x.id === id);
  if (!i) return;
  const skip = new Set(['id','name','desc']);
  const labelMap = {
    id:'ID', name:'Item Name', desc:'Description', type:'Type', vendor:'Vendor',
    procMethod:'Proc. Method', locationCurrent:'Current Location', locationNew:'New Location',
    roomType:'Room Type', roomNo:'Room No.', qtyNeeded:'Qty Needed', qtyExisting:'Qty Existing',
    qtyNew:'Qty New', unitPrice:'Unit Price', extCost:'Ext. Cost', processStatus:'Process Status',
    ffeStatus:'FF&E Status', condition:'Condition', priority:'Priority', swing:'Swing Space?',
    moveId:'Move ID', notes:'Notes', location:'Location', assignedTo:'Assigned To',
    fromDate:'From Date', toDate:'To Date', ffeId:'FF&E ID', ssId:'SS ID',
    scope:'Scope', contractor:'Contractor', plannedCost:'Planned Cost', actualCost:'Actual Cost',
    startDate:'Start Date', endDate:'End Date', userGroup:'User/Group',
    fromFloor:'From Floor', fromRoom:'From Room', toFloor:'To Floor', toRoom:'To Room',
    moveDate:'Move Date', mover:'Mover', poc:'POC', status:'Status',
  };
  const header = [['ID', i.id], ['Item Name', i.name], ['Description', i.desc || '—']];
  const rest = Object.entries(i)
    .filter(([k]) => !skip.has(k))
    .map(([k, v]) => {
      const label = labelMap[k] || k;
      let val = v;
      if (typeof v === 'boolean') val = v ? 'Yes' : 'No';
      else if (typeof v === 'number') val = k.toLowerCase().includes('cost') || k.toLowerCase().includes('price') ? fmt(v) : v;
      else if (v === null || v === undefined || v === '') val = '—';
      return [label, val];
    });
  const fields = [...header, ...rest];
  const overlay = document.createElement('div');
  overlay.className = 'ffe-detail-overlay';
  overlay.innerHTML = `
    <div class="ffe-detail-modal">
      <div class="ffe-detail-header">
        <div>
          <div class="ffe-detail-title">${i.name}</div>
          <div class="ffe-detail-subtitle">${i.id} · ${i.type}</div>
        </div>
        <button class="ffe-detail-close" onclick="this.closest('.ffe-detail-overlay').remove()">✕</button>
      </div>
      <div class="ffe-detail-body">
        ${fields.map(([k,v]) => `<div class="ffe-detail-field"><div class="ffe-detail-key">${k}</div><div class="ffe-detail-val">${v}</div></div>`).join('')}
      </div>
    </div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function emptyRow(cols, msg) {
  return `<tr><td colspan="${cols}" style="text-align:center;padding:40px;color:var(--muted);font-family:var(--mono);font-size:11px;">${msg}</td></tr>`;
}

    <span class="badge badge-warn">Move Date: ${ACTIVE.project.moveDate}</span>

  <div class="content">

      <div class="stat-card warn"><div class="stat-label">Total Spend (Planned)</div><div class="stat-value">${fmtK(ACTIVE.project.plannedSpend)}</div><div class="stat-sub">FF&amp;E + Other</div></div>

    </div>
    <div class="grid-2">

// ROUTER
// =============================================================
const ROUTES = {
  dashboard: { render:renderDashboard,  init:null           },
  ffe:       { render:renderFFE,        init:initFFE        },
  move:      { render:renderMove,       init:initMove       },
  schedule:  { render:renderSchedule,   init:null           },
  swing:     { render:renderSwing,      init:initSwing      },
  ti:        { render:renderTI,         init:initTI         },
  issues:    { render:renderIssues,     init:initIssues     },
  punchlist: { render:renderPunchList,  init:initPunchList  },
  reports:   { render:renderReports,    init:null           },
  settings:  { render:renderSettings,   init:initSettings   },
  users:     { render:renderUsers,      init:initUsers      },
};

function navigate(routeKey) {
  const route = ROUTES[routeKey] || ROUTES.dashboard;
  const container = document.getElementById('app-content');

  // Update active nav state
  document.querySelectorAll('.nav-item[data-route]').forEach(el => {
    el.classList.toggle('active', el.dataset.route === routeKey);
  });

  // Render page HTML into the content area
  container.innerHTML = `<main class="main page-enter">${route.render()}</main>`;

  // Run initializer to wire interactivity
  if (route.init) route.init(container);

  // Sync URL hash
  if (location.hash !== '#' + routeKey) history.replaceState(null, '', '#' + routeKey);
}

// Hash-based routing
window.addEventListener('hashchange', () => navigate(location.hash.replace('#','') || 'dashboard'));

// Nav click handlers
document.querySelectorAll('.nav-item[data-route]').forEach(el => {
  el.addEventListener('click', e => { e.preventDefault(); navigate(el.dataset.route); });
});

// Boot
navigate(location.hash.replace('#','') || 'dashboard');
</script>
